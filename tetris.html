<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- スマホ対応 viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テトリス</title>

  <style>
    /* ===== リセット ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Meiryo", sans-serif;
      background:
        radial-gradient(circle at top, #1d2755 0, #050818 55%, #02030a 100%);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;        /* 横スクロール禁止 */
    }

    /* ===== 共通レイアウト（PC 基準）===== */

    .app-shell {
      width: 100%;
      max-width: 1200px;
      padding: 24px;
    }

    /* PC では「左右デコ + 中央ゲーム」構成 */
    .app-frame {
      display: grid;
      grid-template-columns: 1fr minmax(0, 920px) 1fr;
      gap: 24px;
      align-items: stretch;
    }

    /* 左右ネオン背景パネル（PC用） */
    .side-deco {
      border-radius: 24px;
      background: radial-gradient(circle at center, rgba(0,255,255,0.16), transparent 70%);
      opacity: 0.7;
    }

    /* 中央ゲームカード */
    .game-card {
      border-radius: 24px;
      padding: 24px 28px;
      background:
        radial-gradient(circle at top left, rgba(0,255,255,0.12), transparent 60%),
        radial-gradient(circle at bottom right, rgba(123,47,247,0.18), transparent 65%),
        rgba(10, 13, 32, 0.95);
      box-shadow:
        0 0 40px rgba(0, 0, 0, 0.8),
        0 0 0 1px rgba(0, 255, 255, 0.25);
    }

    /* ゲームコンテナ（PC：ボード + サイドパネル 2カラム） */
    .game-container {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      justify-content: center;
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
    }

    /* ===== ゲーム盤面 ===== */
    .board-wrapper {
      flex: 0 0 360px;
      max-width: 360px;
      border-radius: 18px;
      padding: 8px;
      background: rgba(3, 8, 24, 0.95);
      box-shadow:
        0 0 32px rgba(0, 255, 255, 0.25),
        inset 0 0 20px rgba(0, 0, 0, 0.7);
    }

    /* 盤面キャンバス（内部ロジック上は 10x20 想定） */
    canvas#board {
      display: block;
      width: 100%;
      height: 100%;
      aspect-ratio: 1 / 2; /* 見た目比率のみ固定 */
      background: radial-gradient(circle at top, #050816 0, #000 60%);
      border-radius: 14px;
      box-shadow: 0 0 18px rgba(0, 255, 255, 0.4);
    }

    /* ===== 右側情報パネル（PC）===== */
    .side-panel {
      flex: 0 0 220px;
      max-width: 220px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .panel-box {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(8, 12, 30, 0.95);
      box-shadow:
        0 0 16px rgba(0, 0, 0, 0.8),
        0 0 0 1px rgba(0, 255, 255, 0.12);
    }

    .panel-box h3 {
      font-size: 12px;
      margin-bottom: 6px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .panel-box .value {
      font-size: 28px;
      font-weight: 700;
      color: #00e5ff;
      text-shadow: 0 0 8px rgba(0, 255, 255, 0.7);
    }

    canvas#next {
      display: block;
      margin: 4px auto 0;
      width: 160px;
      height: 160px;
      background: #050815;
      border-radius: 10px;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.9);
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }

    .btn {
      width: 100%;
      padding: 10px 16px;
      border-radius: 999px;
      border: none;
      color: #fff;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      background: linear-gradient(135deg, #00bcd4, #7b2ff7);
      box-shadow: 0 0 16px rgba(0, 188, 212, 0.6);
      white-space: nowrap;   /* ボタン文字が切れないようにする */
    }

    .btn:active {
      transform: translateY(1px);
      box-shadow: 0 0 10px rgba(0, 188, 212, 0.4);
    }

    /* ===== スマホレイアウト（1カラム縦並び） ===== */
    @media (max-width: 768px) {
      body {
        align-items: flex-start;
        padding: 16px 0;
      }

      .app-shell {
        padding: 12px 8px 24px;
      }

      /* 装飾パネルは非表示（ゲーム盤面優先） */
      .side-deco {
        display: none;
      }

      .app-frame {
        display: block;
      }

      .game-card {
        padding: 12px 10px 16px;
        border-radius: 0;
        box-shadow: none;
        background:
          radial-gradient(circle at top, rgba(0,255,255,0.2), transparent 55%),
          rgba(5, 8, 24, 0.97);
      }

      /* 1,2,5. スマホでは 1 カラム縦並び & 固定幅撤廃 */
      .game-container {
        flex-direction: column;
        align-items: center;
        gap: 16px;
        width: 100%;
        max-width: none;
      }

      /* 6. board-wrapper は width: min(92vw, 420px)、aspect-ratio: 1 / 2 */
      .board-wrapper {
        width: min(92vw, 420px);
        max-width: 420px;
        padding: 6px;
      }

      /* 7. canvas#board は width:100%, height:100%（aspect-ratioに従う） */
      canvas#board {
        width: 100%;
        height: 100%;
        aspect-ratio: 1 / 2;
      }

      /* 3,8. 盤面の下に：スコア/レベル/ライン → ネクスト → ボタン */
      .side-panel {
        width: 100%;
        max-width: 420px;
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }

      .panel-box {
        width: 100%;
      }

      .stat-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .stat-grid .panel-box {
        width: 100%;
      }

      canvas#next {
        width: 100%;
        height: auto;
        max-height: 220px;
      }

      .btn {
        font-size: 14px;
        padding-block: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="app-frame">
      <!-- PC用 左右デコ（スマホでは display:none） -->
      <div class="side-deco"></div>

      <!-- 中央ゲームカード -->
      <main class="game-card">
        <div class="game-container">
          <!-- 盤面：PCでは左、スマホでは最上段 -->
          <section class="board-wrapper">
            <!-- JS側で width/height を設定していても OK。CSS でリサイズ。 -->
            <canvas id="board"></canvas>
          </section>

          <!-- 情報パネル：スコア / レベル / ライン / ネクスト / ボタン -->
          <aside class="side-panel">
            <!-- スコア / レベル / ライン は PC では縦、スマホでは 3列グリッド -->
            <div class="stat-grid">
              <div class="panel-box">
                <h3>スコア</h3>
                <div class="value" id="score">0</div>
              </div>
              <div class="panel-box">
                <h3>レベル</h3>
                <div class="value" id="level">1</div>
              </div>
              <div class="panel-box">
                <h3>ライン</h3>
                <div class="value" id="lines">0</div>
              </div>
            </div>

            <!-- ネクスト -->
            <div class="panel-box">
              <h3>ネクスト</h3>
              <canvas id="next" width="160" height="160"></canvas>
            </div>

            <!-- 操作ボタン -->
            <div class="panel-box">
              <div class="button-group">
                <button type="button" class="btn" id="startBtn">スタート</button>
                <button type="button" class="btn" id="pauseBtn">ポーズ</button>
              </div>
            </div>
          </aside>
        </div>
      </main>

      <div class="side-deco"></div>
    </div>
  </div>

  <!-- ゲームロジック JavaScript はこの <script> の中に元のコードを貼り付けてください -->
  <script>
    /*
      ここに、元の tetris.html / index.html の
      テトリスの JavaScript ゲームロジックを「そのまま」コピペしてください。

      例：
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 36;
        const boardCanvas = document.getElementById('board');
        const nextCanvas  = document.getElementById('next');
        ...
    */
  </script>
</body>
</html>
